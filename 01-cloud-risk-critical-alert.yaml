name: cloud-risk-critical-alert
description: |
  Sends an email notification when Falcon Cloud Security detects a new Critical or High
  severity cloud risk in your AWS environment. Cloud risks correlate findings like internet
  exposure, unrotated credentials, RCE vulnerabilities, and over-permissioned identities
  into compound risk signals.

  SETUP REQUIRED:
    1. Import into Falcon > Fusion SOAR > Workflows > Create workflow
    2. Replace "security-team@your-company.com" in the send_notification step
    3. (Optional) Tighten the severity filter to Critical only if alert volume is too high
    4. Test using Fusion SOAR's mock data feature, then Enable

  FIELD PATHS:
    Based on the /cloud-security-risks/combined/cloud-risks/v1 API response.
    Cloud Risk trigger fields are flat (not nested like IOM fields).
    Severity values are UPPERCASE: CRITICAL, HIGH, MEDIUM, LOW
    If any field fails validation, use the Workflow Data panel in the canvas editor
    to copy the verified paths from a real execution.

  PREREQUISITES:
    - Falcon Cloud Security subscription (CNAPP, Proactive, or Cloud Security)
    - At least one AWS account registered in Falcon Cloud Security

  VERIFIED ACTION IDs:
    - Send email:  07413ef9ba7c47bf5a242799f59902cc
    - Print data:  aadbf530e35fc452a032f5f8acaaac2a

provision_on_install: false

trigger:
    name: Cloud risk response
    type: Cloud risk response
    next:
        - check_severity

conditions:
    # Severity values from the Cloud Risk API are UPPERCASE: CRITICAL, HIGH, MEDIUM, LOW
    check_severity:
        next:
            - send_notification
        cel_expression: >
            data['trigger.severity'] == 'CRITICAL' ||
            data['trigger.severity'] == 'HIGH'
        display:
            - Risk is Critical or High severity
        else:
            - log_skipped

actions:
    send_notification:
        id: 07413ef9ba7c47bf5a242799f59902cc
        properties:
            to:
                # ↓ CONFIGURE: Replace with your security team's email address
                - security-team@your-company.com
            subject: "[FALCON CLOUD RISK] ${data['trigger.severity']}: ${data['trigger.rule_name']}"
            msg: |
                Falcon Cloud Security has detected a new compound cloud risk.

                ── RISK DETAILS ─────────────────────────────
                Risk Name:       ${data['trigger.rule_name']}
                Severity:        ${data['trigger.severity']}
                Status:          ${data['trigger.status']}
                Cloud Provider:  ${data['trigger.provider']}
                Cloud Account:   ${data['trigger.account_id']}
                Region:          ${data['trigger.asset_region']}
                Asset Name:      ${data['trigger.asset_name']}
                Asset ID:        ${data['trigger.asset_id']}
                Asset Type:      ${data['trigger.asset_type']}
                First Seen:      ${data['trigger.first_seen']}

                ── WHY THIS MATTERS ─────────────────────────
                Cloud risks surface dangerous combinations that look low-severity in
                isolation — for example, a publicly exposed compute instance that ALSO
                has an over-privileged identity and unrotated credentials.

                ── NEXT STEPS ───────────────────────────────
                1. Log in to the Falcon console
                2. Navigate to Cloud Security > Cloud Risks
                3. Filter by the asset ID above
                4. Follow the guided remediation steps

                Console: https://falcon.crowdstrike.com/cloud-security/cloud-risks
                ─────────────────────────────────────────────
                Sent by Falcon Fusion SOAR | cloud-risk-critical-alert
            msg_type: "text"
        version_constraint: ~1
        next:
            - log_sent

    log_sent:
        id: aadbf530e35fc452a032f5f8acaaac2a
        properties:
            text_data: >
                [cloud-risk-critical-alert] Alert sent —
                Rule: ${data['trigger.rule_name']} |
                Severity: ${data['trigger.severity']} |
                Account: ${data['trigger.account_id']} |
                Asset: ${data['trigger.asset_id']}
        version_constraint: ~1

    log_skipped:
        id: aadbf530e35fc452a032f5f8acaaac2a
        properties:
            text_data: >
                [cloud-risk-critical-alert] Low severity risk suppressed —
                Rule: ${data['trigger.rule_name']} |
                Severity: ${data['trigger.severity']}
        version_constraint: ~1

output_fields: []
