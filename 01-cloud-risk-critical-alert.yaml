name: cloud-risk-critical-alert
description: |
  Sends an email notification when Falcon Cloud Security detects a new Critical or High
  severity cloud risk in your AWS environment. Cloud risks correlate findings like internet
  exposure, unrotated credentials, RCE vulnerabilities, and over-permissioned identities
  into compound risk signals.

  SETUP REQUIRED:
    1. Import into Falcon > Fusion SOAR > Workflows > Create workflow
    2. Replace "security-team@your-company.com" in the send_notification step
    3. (Optional) Tighten the severity filter to Critical only if alert volume is too high
    4. Test using Fusion SOAR's mock data feature, then Enable

  FIELD PATHS (verified via /workflows/combined/triggers/v1 API):
    All Cloud Risk trigger fields use Trigger.CloudRisk.* (PascalCase, capital T).
    Severity values: Critical, High, Medium, Low (Title Case)
    Status values: Open, Resolved, Suppressed

  PREREQUISITES:
    - Falcon Cloud Security subscription (CNAPP, Proactive, or Cloud Security)
    - At least one AWS account registered in Falcon Cloud Security

  VERIFIED ACTION IDs:
    - Send email:  07413ef9ba7c47bf5a242799f59902cc
    - Print data:  aadbf530e35fc452a032f5f8acaaac2a

provision_on_install: false

trigger:
    name: Cloud risk
    next:
        - check_severity

conditions:
    # Severity values: Critical, High, Medium, Low (Title Case)
    check_severity:
        next:
            - send_notification
        cel_expression: >
            data['Trigger.CloudRisk.Severity'] == 'Critical' ||
            data['Trigger.CloudRisk.Severity'] == 'High'
        display:
            - Risk is Critical or High severity
        else:
            - log_skipped

actions:
    send_notification:
        id: 07413ef9ba7c47bf5a242799f59902cc
        properties:
            to:
                # ↓ CONFIGURE: Replace with your security team's email address
                - security-team@your-company.com
            subject: "[FALCON CLOUD RISK] ${data['Trigger.CloudRisk.Severity']}: ${data['Trigger.CloudRisk.RuleName']}"
            msg: |
                Falcon Cloud Security has detected a new compound cloud risk.

                ── RISK DETAILS ─────────────────────────────
                Risk Name:       ${data['Trigger.CloudRisk.RuleName']}
                Severity:        ${data['Trigger.CloudRisk.Severity']}
                Status:          ${data['Trigger.CloudRisk.Status']}
                Cloud Provider:  ${data['Trigger.CloudRisk.Asset.CloudProvider']}
                Cloud Account:   ${data['Trigger.CloudRisk.Asset.CloudAccountId']}
                Account Name:    ${data['Trigger.CloudRisk.Asset.CloudAccountName']}
                Region:          ${data['Trigger.CloudRisk.Asset.Region']}
                Asset Name:      ${data['Trigger.CloudRisk.Asset.Name']}
                Asset ID:        ${data['Trigger.CloudRisk.Asset.ID']}
                Asset Type:      ${data['Trigger.CloudRisk.Asset.Type']}
                First Seen:      ${data['Trigger.CloudRisk.FirstSeen']}

                ── RISK DESCRIPTION ─────────────────────────
                ${data['Trigger.CloudRisk.RuleDescription']}

                ── ASSET CONSOLE LINK ───────────────────────
                ${data['Trigger.CloudRisk.Asset.URL']}

                ── WHY THIS MATTERS ─────────────────────────
                Cloud risks surface dangerous combinations that look low-severity in
                isolation — for example, a publicly exposed compute instance that ALSO
                has an over-privileged identity and unrotated credentials.

                ── NEXT STEPS ───────────────────────────────
                1. Click the asset console link above to investigate directly
                2. Navigate to Cloud Security > Cloud Risks for full context
                3. Follow the guided remediation steps in the Falcon console

                Console: https://falcon.crowdstrike.com/cloud-security/cloud-risks
                ─────────────────────────────────────────────
                Sent by Falcon Fusion SOAR | cloud-risk-critical-alert
            msg_type: "text"
        version_constraint: ~1
        next:
            - log_sent

    log_sent:
        id: aadbf530e35fc452a032f5f8acaaac2a
        properties:
            text_data: >
                [cloud-risk-critical-alert] Alert sent —
                Rule: ${data['Trigger.CloudRisk.RuleName']} |
                Severity: ${data['Trigger.CloudRisk.Severity']} |
                Account: ${data['Trigger.CloudRisk.Asset.CloudAccountId']} |
                Asset: ${data['Trigger.CloudRisk.Asset.ID']}
        version_constraint: ~1

    log_skipped:
        id: aadbf530e35fc452a032f5f8acaaac2a
        properties:
            text_data: >
                [cloud-risk-critical-alert] Low severity risk suppressed —
                Rule: ${data['Trigger.CloudRisk.RuleName']} |
                Severity: ${data['Trigger.CloudRisk.Severity']}
        version_constraint: ~1

output_fields: []
