name: iom-detection-triage
description: |
  Triages new Indicator of Misconfiguration (IOM) detections from Falcon Cloud Security.
  Notifies the cloud security team with full context — rule, resource, account, region —
  so they can investigate and remediate without hunting for details in the console.

  IOMs detect individual cloud misconfigurations like open S3 buckets, disabled MFA on
  root accounts, unencrypted volumes, publicly exposed RDS instances, and more.

  SETUP REQUIRED:
    1. Import into Falcon > Fusion SOAR > Workflows > Create workflow
    2. Replace "cloud-sec@your-company.com" in the send_iom_alert step
    3. (Optional) Add a ServiceNow or Jira action after send_iom_alert to auto-create tickets
    4. Adjust the severity filter — default is medium and above (values are lowercase)
    5. Test with mock data, then Enable

  FIELD PATHS:
    These are based on the documented /cloud-security-evaluations/entities/ioms/v1
    API response structure. If any field fails validation, open the workflow canvas,
    trigger a test execution, and use the Workflow Data panel to copy exact paths.

  PREREQUISITES:
    - Falcon Cloud Security subscription
    - At least one cloud account registered in Falcon Cloud Security

  VERIFIED ACTION IDs:
    - Send email:  07413ef9ba7c47bf5a242799f59902cc
    - Print data:  aadbf530e35fc452a032f5f8acaaac2a

provision_on_install: false

trigger:
    name: IOM detection
    type: IOM detection
    next:
        - check_iom_severity

conditions:
    # Severity values from the IOM API are lowercase: critical, high, medium, low
    check_iom_severity:
        next:
            - send_iom_alert
        cel_expression: >
            data['trigger.evaluation.severity'] == 'critical' ||
            data['trigger.evaluation.severity'] == 'high' ||
            data['trigger.evaluation.severity'] == 'medium'
        display:
            - IOM severity is medium or above
        else:
            - log_iom_skipped

actions:
    send_iom_alert:
        id: 07413ef9ba7c47bf5a242799f59902cc
        properties:
            to:
                # ↓ CONFIGURE: Replace with your cloud security team's email address
                - cloud-sec@your-company.com
            subject: "[FALCON IOM] ${data['trigger.evaluation.severity']} — ${data['trigger.resource.service']} | ${data['trigger.cloud.provider']} ${data['trigger.cloud.region']}"
            msg: |
                Falcon Cloud Security has detected a cloud misconfiguration (IOM).

                ── FINDING DETAILS ──────────────────────────
                Rule:            ${data['trigger.evaluation.rule.name']}
                Severity:        ${data['trigger.evaluation.severity']}
                Status:          ${data['trigger.evaluation.status']}
                Service:         ${data['trigger.resource.service']}
                Resource Type:   ${data['trigger.resource.resource_type']}
                Resource ID:     ${data['trigger.resource.resource_id']}
                Cloud Provider:  ${data['trigger.cloud.provider']}
                Cloud Account:   ${data['trigger.cloud.account_id']}
                Region:          ${data['trigger.cloud.region']}
                First Detected:  ${data['trigger.evaluation.first_detected']}

                ── RESOURCE CONSOLE LINK ────────────────────
                ${data['trigger.evaluation.url']}

                ── REMEDIATION GUIDANCE ─────────────────────
                Open this finding in the Falcon console for step-by-step
                remediation instructions:

                https://falcon.crowdstrike.com/cloud-security/posture

                ─────────────────────────────────────────────
                Sent by Falcon Fusion SOAR | iom-detection-triage
            msg_type: "text"
        version_constraint: ~1
        next:
            - log_iom_alerted

    log_iom_alerted:
        id: aadbf530e35fc452a032f5f8acaaac2a
        properties:
            text_data: >
                [iom-detection-triage] Alert sent —
                Rule: ${data['trigger.evaluation.rule.name']} |
                Severity: ${data['trigger.evaluation.severity']} |
                Service: ${data['trigger.resource.service']} |
                Resource: ${data['trigger.resource.resource_id']} |
                Account: ${data['trigger.cloud.account_id']}
        version_constraint: ~1

    log_iom_skipped:
        id: aadbf530e35fc452a032f5f8acaaac2a
        properties:
            text_data: >
                [iom-detection-triage] Low severity IOM suppressed —
                Severity: ${data['trigger.evaluation.severity']} |
                Service: ${data['trigger.resource.service']}
        version_constraint: ~1

output_fields: []
