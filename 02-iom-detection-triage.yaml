name: iom-detection-triage
description: |
  Triages new Indicator of Misconfiguration (IOM) detections from Falcon Cloud Security.
  Notifies the cloud security team with full context — rule, service, account, provider —
  so they can investigate and remediate without hunting for details in the console.

  IOMs detect individual cloud misconfigurations like open S3 buckets, disabled MFA on
  root accounts, unencrypted volumes, publicly exposed RDS instances, and more.

  SETUP REQUIRED:
    1. Import into Falcon > Fusion SOAR > Workflows > Create workflow
    2. Replace "cloud-sec@your-company.com" in the send_iom_alert step
    3. (Optional) Add a ServiceNow or Jira action after send_iom_alert to auto-create tickets
    4. Adjust the severity filter — default is medium and above
    5. Test with mock data, then Enable

  FIELD PATHS (verified via /workflows/combined/triggers/v1 API):
    The Cloud security assessment trigger exposes Trigger.CloudSecurityAssessment.* fields.
    Severity values: Critical, High, Medium, Informational (Title Case)
    CloudProvider values: AWS, Azure, GCP
    Disposition values vary by policy (typically Passed/Failed/etc.)

  NOTE ON FIELD AVAILABILITY:
    The Cloud security assessment trigger exposes policy-level information.
    For deep resource-level details (resource ID, region, ARN), navigate to:
    Cloud Security > Posture and Compliance > IOM Findings in the Falcon console.

  PREREQUISITES:
    - Falcon Cloud Security subscription
    - At least one cloud account registered in Falcon Cloud Security

  VERIFIED ACTION IDs:
    - Send email:  07413ef9ba7c47bf5a242799f59902cc
    - Print data:  aadbf530e35fc452a032f5f8acaaac2a

provision_on_install: false

trigger:
    name: Cloud security assessment
    type: Cloud security assessment
    next:
        - check_iom_severity

conditions:
    # Severity values: Critical, High, Medium, Informational (Title Case)
    check_iom_severity:
        next:
            - send_iom_alert
        cel_expression: >
            data['Trigger.CloudSecurityAssessment.Severity'] == 'Critical' ||
            data['Trigger.CloudSecurityAssessment.Severity'] == 'High' ||
            data['Trigger.CloudSecurityAssessment.Severity'] == 'Medium'
        display:
            - IOM severity is medium or above
        else:
            - log_iom_skipped

actions:
    send_iom_alert:
        id: 07413ef9ba7c47bf5a242799f59902cc
        properties:
            to:
                # ↓ CONFIGURE: Replace with your cloud security team's email address
                - cloud-sec@your-company.com
            subject: "[FALCON IOM] ${data['Trigger.CloudSecurityAssessment.Severity']} — ${data['Trigger.CloudSecurityAssessment.CloudServiceName']} | ${data['Trigger.CloudSecurityAssessment.CloudProvider']}"
            msg: |
                Falcon Cloud Security has detected a cloud misconfiguration (IOM).

                ── FINDING DETAILS ──────────────────────────
                Policy:          ${data['Trigger.CloudSecurityAssessment.PolicyStatement']}
                Policy ID:       ${data['Trigger.CloudSecurityAssessment.PolicyID']}
                Severity:        ${data['Trigger.CloudSecurityAssessment.Severity']}
                Disposition:     ${data['Trigger.CloudSecurityAssessment.Disposition']}
                Service:         ${data['Trigger.CloudSecurityAssessment.CloudServiceName']}
                Cloud Provider:  ${data['Trigger.CloudSecurityAssessment.CloudProvider']}
                AWS Account ID:  ${data['Trigger.CloudSecurityAssessment.AWS.AccountID']}

                ── REMEDIATION GUIDANCE ─────────────────────
                Open this finding in the Falcon console for step-by-step
                remediation instructions and the affected resource details:

                https://falcon.crowdstrike.com/cloud-security/posture

                ─────────────────────────────────────────────
                Sent by Falcon Fusion SOAR | iom-detection-triage
            msg_type: "text"
        version_constraint: ~1
        next:
            - log_iom_alerted

    log_iom_alerted:
        id: aadbf530e35fc452a032f5f8acaaac2a
        properties:
            text_data: >
                [iom-detection-triage] Alert sent —
                Policy: ${data['Trigger.CloudSecurityAssessment.PolicyStatement']} |
                Severity: ${data['Trigger.CloudSecurityAssessment.Severity']} |
                Service: ${data['Trigger.CloudSecurityAssessment.CloudServiceName']} |
                Provider: ${data['Trigger.CloudSecurityAssessment.CloudProvider']}
        version_constraint: ~1

    log_iom_skipped:
        id: aadbf530e35fc452a032f5f8acaaac2a
        properties:
            text_data: >
                [iom-detection-triage] Low severity IOM suppressed —
                Severity: ${data['Trigger.CloudSecurityAssessment.Severity']} |
                Service: ${data['Trigger.CloudSecurityAssessment.CloudServiceName']}
        version_constraint: ~1

output_fields: []
