name: waf-iom-detection-alert
description: |
  Alerts on Indicators of Misconfiguration (IOMs) for WAF-related cloud services detected
  by Falcon Cloud Security CSPM. Catches misconfigurations in AWS WAF / WAFv2, Azure
  Application Gateway WAF, Azure Front Door WAF, and related services — things like WAF
  protection not enabled on a load balancer, WAF logging disabled, or WAF running in
  Detection mode instead of Prevention mode.

  SETUP REQUIRED:
    1. Import into Falcon > Fusion SOAR > Workflows > Create workflow
    2. Replace "security-team@your-company.com" in send_waf_iom_alert
    3. Verify the WAF service names in the waf_service_filter condition — see below
    4. (Optional) Tighten severity filter — default is medium and above
    5. Test with mock data, then Enable

  FINDING YOUR WAF SERVICE NAMES:
    The resource.service field in IOM events uses short identifiers (e.g. "WAFv2", "ELB").
    To find the exact values for your registered accounts:
    1. Go to: Cloud Security > Rules and Policies > IOM Rules
    2. Filter the Service column for WAF / WAFv2 / Application Gateway / Front Door
    3. Note the exact strings shown — update waf_service_filter's cel_expression to match

  COMMON WAF SERVICE VALUES (verify against your tenant):
    AWS:   "WAFv2", "WAF" (Classic v1), "WAF Regional"
    Azure: "ApplicationGateway", "FrontDoor" (exact casing varies)
    GCP:   "CloudArmor" or "Compute" (Cloud Armor policies are under Compute)

  FIELD PATHS:
    Based on the documented /cloud-security-evaluations/entities/ioms/v1 API response.
    Nested structure: cloud.*, resource.*, evaluation.*
    If any field fails validation, use the Workflow Data panel in the canvas editor
    to copy the verified paths from a real execution.

  PREREQUISITES:
    - Falcon Cloud Security subscription (CNAPP, Proactive, or Cloud Security)
    - Cloud accounts registered in Falcon Cloud Security
    - IOM rules enabled for WAF-related services (enabled by default)

  VERIFIED ACTION IDs:
    - Send email:  07413ef9ba7c47bf5a242799f59902cc
    - Print data:  aadbf530e35fc452a032f5f8acaaac2a

provision_on_install: false

trigger:
    name: IOM detection
    type: IOM detection
    next:
        - waf_service_filter

conditions:
    # Filters to WAF-related services only.
    # Update these values to match what your Falcon tenant reports.
    # Check: Cloud Security > Rules and Policies > IOM Rules > Service column
    waf_service_filter:
        next:
            - check_waf_iom_severity
        cel_expression: >
            data['trigger.resource.service'].contains('WAF') ||
            data['trigger.resource.service'].contains('Waf') ||
            data['trigger.resource.service'] == 'ApplicationGateway' ||
            data['trigger.resource.service'] == 'FrontDoor' ||
            data['trigger.resource.service'] == 'CloudArmor' ||
            data['trigger.resource.service'] == 'FirewallManager'
        display:
            - IOM is for a WAF-related service
        else:
            - log_non_waf_skipped

    # Severity values from the IOM API are lowercase: critical, high, medium, low
    check_waf_iom_severity:
        next:
            - send_waf_iom_alert
        cel_expression: >
            data['trigger.evaluation.severity'] == 'critical' ||
            data['trigger.evaluation.severity'] == 'high' ||
            data['trigger.evaluation.severity'] == 'medium'
        display:
            - IOM severity is medium or above
        else:
            - log_low_severity_skipped

actions:
    send_waf_iom_alert:
        id: 07413ef9ba7c47bf5a242799f59902cc
        properties:
            to:
                # ↓ CONFIGURE: Replace with your security team's email address
                - security-team@your-company.com
            subject: "[FALCON WAF IOM] ${data['trigger.evaluation.severity']} — ${data['trigger.resource.service']} | ${data['trigger.cloud.provider']} ${data['trigger.cloud.region']}"
            msg: |
                Falcon Cloud Security has detected a WAF misconfiguration (IOM).
                A WAF that is misconfigured or missing leaves web-facing resources
                unprotected against injection, XSS, and application-layer attacks.

                ── MISCONFIGURATION DETAILS ─────────────────
                Rule:            ${data['trigger.evaluation.rule.name']}
                Severity:        ${data['trigger.evaluation.severity']}
                Status:          ${data['trigger.evaluation.status']}
                Service:         ${data['trigger.resource.service']}
                Resource Type:   ${data['trigger.resource.resource_type']}
                Resource ID:     ${data['trigger.resource.resource_id']}
                Cloud Provider:  ${data['trigger.cloud.provider']}
                Cloud Account:   ${data['trigger.cloud.account_id']}
                Region:          ${data['trigger.cloud.region']}
                First Detected:  ${data['trigger.evaluation.first_detected']}

                ── RESOURCE CONSOLE LINK ────────────────────
                ${data['trigger.evaluation.url']}

                ── WHAT THIS MEANS ──────────────────────────
                The resource above either lacks WAF protection, has WAF configured
                in a weakened state (e.g. Detection mode only), or has a WAF with
                no active rules — providing no real protection.

                ── REMEDIATION ──────────────────────────────
                Open this finding in the Falcon console for step-by-step guidance:
                https://falcon.crowdstrike.com/cloud-security/posture

                Common fixes by service:
                  AWS WAFv2:          Associate a web ACL with the affected resource
                  AWS WAF logging:    Enable logging to S3 or CloudWatch on the web ACL
                  Azure App Gateway:  Switch WAF policy from Detection to Prevention mode
                  Azure Front Door:   Attach a WAF policy in Prevention mode
                  GCP Cloud Armor:    Attach a security policy to the backend service

                ─────────────────────────────────────────────
                Sent by Falcon Fusion SOAR | waf-iom-detection-alert
            msg_type: "text"
        version_constraint: ~1
        next:
            - log_waf_iom_alerted

    log_waf_iom_alerted:
        id: aadbf530e35fc452a032f5f8acaaac2a
        properties:
            text_data: >
                [waf-iom-detection-alert] Alert sent —
                Rule: ${data['trigger.evaluation.rule.name']} |
                Service: ${data['trigger.resource.service']} |
                Severity: ${data['trigger.evaluation.severity']} |
                Resource: ${data['trigger.resource.resource_id']} |
                Account: ${data['trigger.cloud.account_id']}
        version_constraint: ~1

    log_low_severity_skipped:
        id: aadbf530e35fc452a032f5f8acaaac2a
        properties:
            text_data: >
                [waf-iom-detection-alert] Low severity WAF IOM suppressed —
                Service: ${data['trigger.resource.service']} |
                Severity: ${data['trigger.evaluation.severity']}
        version_constraint: ~1

    log_non_waf_skipped:
        id: aadbf530e35fc452a032f5f8acaaac2a
        properties:
            text_data: >
                [waf-iom-detection-alert] IOM skipped — not a WAF service:
                Service: ${data['trigger.resource.service']} |
                Severity: ${data['trigger.evaluation.severity']}
        version_constraint: ~1

output_fields: []
